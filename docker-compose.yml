version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ceramica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=128M --max_connections=50 --key_buffer_size=16M --thread_cache_size=0 --host_cache_size=0 --innodb_ft_cache_size=1600000 --innodb_ft_total_cache_size=32000000 --thread_stack=131072 --sort_buffer_size=32K --read_buffer_size=8200 --read_rnd_buffer_size=8200 --max_heap_table_size=16M --tmp_table_size=1M --bulk_insert_buffer_size=0 --join_buffer_size=128 --net_buffer_length=1K --innodb_sort_buffer_size=64K --binlog_cache_size=4K --binlog_stmt_cache_size=4K
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mysql_data: